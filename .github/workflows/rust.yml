---
name: Rust

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          pip install pre-commit
          npm install -g prettier
          cargo install cargo-sort

      - name: Generate fixtures
        run: make fixtures

      - name: Format Check
        run: make format

      - name: Lint (Clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::perf -D clippy::pedantic

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Test Suite
        run: set -o pipefail; make rust/test 2>&1 | tee test-results.txt

      - name: Code Coverage
        run: make rust/coverage

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

      - name: Test Summary
        if: always()
        run: |
          PASSED=$(grep -oE '[0-9]+ passed' test-results.txt | awk '{s+=$1} END {print s}' || true)
          FAILED=$(grep -oE '[0-9]+ failed' test-results.txt | awk '{s+=$1} END {print s}' || true)
          IGNORED=$(grep -oE '[0-9]+ ignored' test-results.txt | awk '{s+=$1} END {print s}' || true)
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| [v] Passed | ${PASSED:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| [x] Failed | ${FAILED:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| [~] Skipped | ${IGNORED:-0} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ../.tmp/coverage-lean/codecov.json
          fail_ci_if_error: false

  publish-badge:
    needs: checks
    if: always() && github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Generate and Publish Badge
        run: |
          PASSED=$(grep -oE '[0-9]+ passed' test-results.txt | awk '{s+=$1} END {print s}' || true)
          FAILED=$(grep -oE '[0-9]+ failed' test-results.txt | awk '{s+=$1} END {print s}' || true)
          IGNORED=$(grep -oE '[0-9]+ ignored' test-results.txt | awk '{s+=$1} END {print s}' || true)

          python3 ./scripts/generate_badge.py "${PASSED:-0}" "${FAILED:-0}" "${IGNORED:-0}"

          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout --orphan badges
          git rm -rf .
          git add tests.svg
          git commit -m "Update test badge"
          git push -f origin badges --force
